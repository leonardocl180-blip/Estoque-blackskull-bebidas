<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #222120;
  --surface3: #2a2926;
  --amber: #e8a020;
  --amber-dim: rgba(232,160,32,0.15);
  --amber-dim2: rgba(232,160,32,0.08);
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.15);
  --green: #4caf6f;
  --green-dim: rgba(76,175,111,0.15);
  --yellow: #f0c040;
  --yellow-dim: rgba(240,192,64,0.15);
  --text: #f0ede8;
  --text-muted: #8a8780;
  --border: #2e2c2a;
  --radius: 8px;
  --radius-sm: 5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 16px 8px;
}
.logo { font-family: 'Bebas Neue', cursive; font-size: 22px; color: var(--amber); letter-spacing: 1px; line-height: 1; }
.logo span { color: var(--text-muted); font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 300; display: block; letter-spacing: 0; margin-top: 1px; }

.btn-logout {
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 4px;
  cursor: pointer; transition: all 0.15s; display: none;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* TABS */
.tab-bar {
  display: flex; border-top: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 9px 4px; border: none; background: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--text-muted); letter-spacing: 0.3px; transition: all .15s;
  border-bottom: 2px solid transparent; position: relative;
}
.tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* WEEK BAR */
.week-bar {
  position: fixed; top: 83px; left: 0; right: 0; z-index: 90;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 4px; padding: 8px 12px;
  overflow-x: auto; scrollbar-width: none;
}
.week-bar::-webkit-scrollbar { display: none; }
.week-btn {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text-muted); transition: all .15s; white-space: nowrap;
}
.week-btn.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 500; }
.week-btn:hover:not(.active) { border-color: var(--amber); color: var(--amber); }

/* MAIN CONTENT */
.main { padding-top: 130px; min-height: 100vh; }
.main.no-weekbar { padding-top: 90px; }

/* SEARCH */
.search-wrap { padding: 10px 12px 6px; }
.search-input {
  width: 100%; padding: 9px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--amber); }
.search-input::placeholder { color: var(--text-muted); }

/* CATEGORY HEADER */
.cat-header {
  padding: 14px 12px 6px; font-family: 'Bebas Neue', cursive;
  font-size: 17px; color: var(--amber); letter-spacing: 1px;
  display: flex; align-items: center; gap: 8px;
}
.cat-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.cat-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); font-weight: 400; }

/* ITEM CARD */
.item-list { padding: 0 10px; display: flex; flex-direction: column; gap: 6px; }
.item-card {
  background: var(--surface); border: 1px solid var(--border); border-left: 3px solid transparent;
  border-radius: var(--radius); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px; transition: border-color .15s;
  user-select: none;
}
.item-card.has-qty { border-left-color: var(--amber); }
.item-card.low { border-left-color: var(--yellow); }
.item-card.critical { border-left-color: var(--red); }

.item-name-wrap { flex: 1; min-width: 0; cursor: pointer; }
.item-name {
  font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-code { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }
.min-badge {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-muted);
  background: var(--surface3); border: 1px solid var(--border);
  padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
}

.counter-ctrl { display: flex; align-items: center; gap: 6px; }
.btn-adj {
  width: 30px; height: 30px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center;
  transition: opacity .1s; flex-shrink: 0;
}
.btn-minus { background: var(--red-dim); color: var(--red); }
.btn-plus { background: var(--green-dim); color: var(--green); }
.btn-adj:active { opacity: 0.6; }
.qty-display {
  font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
  color: var(--text); min-width: 36px; text-align: center; line-height: 1;
}
.qty-display.zero { color: var(--text-muted); }

/* FAB */
.fab {
  position: fixed; bottom: 24px; right: 16px; z-index: 200;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--red); border-radius: 24px; padding: 10px 16px;
